<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stick-Verse</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <header>
        <nav>
            <a href="">Accueil</a>
            <a href="">Wiki</a>
            <a href="">Personnages</a>
            <a href="">À propos</a>
        </nav>
    </header>


    <main class="cards">

        <div class="card card-color-commun">
            <h2>Guerrier</h2>
            <div class="card-img">
                <img src="./image/Card01Guerrier.png" alt="Image Guerrier">
            </div>
            <div class="card-stat">
                <p>Vie : 1</p>             
                <p>Attaque : 1</p>
                <p>Défence : 1</p>
                <p>Vitesse : 1</p>
                <p>Rareté : Commun</p>
                <button>Voir plus</button>
            </div>
        </div>

        <div class="card card-color-rare">
            <h2>Archer</h2>
            <div class="card-img">
                <img src="./image/Card02Archer.png" alt="Image Archer">
            </div>
            <div class="card-stat">                
                <p>Vie : 1</p>             
                <p>Attaque : 2</p>
                <p>Défence : 2</p>
                <p>Vitesse : 2</p>
                <p>Rareté : Rare</p>
                <button>Voir plus</button>
            </div>
        </div>


        <div class="card card-color-epic">
            <h2>Lancier</h2>
            <div class="card-img">
                <img src="./image/Card03Lancier.png" alt="Image Lancier">
            </div>
            <div class="card-stat">                
                <p>Attaque : 3</p>
                <p>Defence : 3</p>
                <p>Endurance : 3</p>
                <button>Voir plus</button>
            </div>
        </div>

    </main>

    <footer>

    </footer>

</body>
</html>
